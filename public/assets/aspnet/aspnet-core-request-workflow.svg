<svg xmlns="http://www.w3.org/2000/svg" width="680" height="1430" viewBox="0 0 680 1430" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#73726C" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="680" height="1430" fill="#FFFFFF"/>

  <text x="340" y="34" text-anchor="middle" font-size="19" font-weight="600" fill="#26215C">ASP.NET Core — complete request workflow</text>

  <!-- Middleware container -->
  <rect x="60" y="304" width="560" height="418" rx="14" fill="#FBFBF8" stroke="#B4B2A9" stroke-width="1"/>
  <text x="340" y="330" text-anchor="middle" font-size="14" font-weight="600" fill="#2C2C2A">Middleware pipeline — runs in this order</text>

  <!-- Controller container -->
  <rect x="60" y="748" width="560" height="334" rx="14" fill="#FBFBF8" stroke="#B4B2A9" stroke-width="1"/>
  <text x="340" y="774" text-anchor="middle" font-size="14" font-weight="600" fill="#2C2C2A">Controller / endpoint — MVC filters</text>
  <text x="340" y="792" text-anchor="middle" font-size="12" fill="#5F5E5A">Filters run in order; exception filters fire only if the action throws</text>

  <!-- Arrows -->
  <line x1="340" y1="126" x2="340" y2="144" stroke="#73726C" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="340" y1="204" x2="340" y2="222" stroke="#73726C" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="340" y1="282" x2="340" y2="300" stroke="#73726C" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="340" y1="384" x2="340" y2="394" stroke="#73726C" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="340" y1="438" x2="340" y2="448" stroke="#73726C" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="340" y1="492" x2="340" y2="502" stroke="#73726C" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="340" y1="546" x2="340" y2="556" stroke="#73726C" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="340" y1="600" x2="340" y2="610" stroke="#73726C" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="340" y1="654" x2="340" y2="664" stroke="#73726C" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="340" y1="726" x2="340" y2="744" stroke="#73726C" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="340" y1="838" x2="340" y2="848" stroke="#73726C" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="340" y1="884" x2="340" y2="894" stroke="#73726C" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="340" y1="930" x2="340" y2="940" stroke="#73726C" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="340" y1="976" x2="340" y2="986" stroke="#73726C" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="340" y1="1022" x2="340" y2="1032" stroke="#73726C" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="340" y1="1086" x2="340" y2="1104" stroke="#73726C" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="340" y1="1164" x2="340" y2="1182" stroke="#73726C" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="340" y1="1242" x2="340" y2="1260" stroke="#73726C" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Client -->
  <rect x="60" y="70" width="560" height="52" rx="8" fill="#F1EFE8" stroke="#888780" stroke-width="0.5"/>
  <text x="340" y="93" text-anchor="middle" font-size="14" font-weight="600" fill="#2C2C2A">Client</text>
  <text x="340" y="111" text-anchor="middle" font-size="12" fill="#5F5E5A">Browser or mobile app sends HTTP request</text>

  <!-- Load balancer -->
  <rect x="60" y="148" width="560" height="52" rx="8" fill="#F1EFE8" stroke="#888780" stroke-width="0.5"/>
  <text x="340" y="171" text-anchor="middle" font-size="14" font-weight="600" fill="#2C2C2A">Load balancer / API gateway</text>
  <text x="340" y="189" text-anchor="middle" font-size="12" fill="#5F5E5A">Coarse rate limiting: per-IP, per-API-key, DDoS</text>

  <!-- Kestrel -->
  <rect x="60" y="226" width="560" height="52" rx="8" fill="#F1EFE8" stroke="#888780" stroke-width="0.5"/>
  <text x="340" y="249" text-anchor="middle" font-size="14" font-weight="600" fill="#2C2C2A">Kestrel web server</text>
  <text x="340" y="267" text-anchor="middle" font-size="12" fill="#5F5E5A">Accepts connection, forwards to pipeline</text>

  <!-- Middleware 1 -->
  <rect x="76" y="340" width="528" height="44" rx="8" fill="#EEEDFE" stroke="#7F77DD" stroke-width="0.5"/>
  <text x="340" y="359" text-anchor="middle" font-size="14" font-weight="600" fill="#3C3489">1. Exception handling</text>
  <text x="340" y="375" text-anchor="middle" font-size="12" fill="#534AB7">Wraps everything downstream</text>

  <!-- Middleware 2 -->
  <rect x="76" y="394" width="528" height="44" rx="8" fill="#EEEDFE" stroke="#7F77DD" stroke-width="0.5"/>
  <text x="340" y="413" text-anchor="middle" font-size="14" font-weight="600" fill="#3C3489">2. Request logging</text>
  <text x="340" y="429" text-anchor="middle" font-size="12" fill="#534AB7">Logs each request and response (Serilog)</text>

  <!-- Middleware 3 -->
  <rect x="76" y="448" width="528" height="44" rx="8" fill="#EEEDFE" stroke="#7F77DD" stroke-width="0.5"/>
  <text x="340" y="467" text-anchor="middle" font-size="14" font-weight="600" fill="#3C3489">3. Static files</text>
  <text x="340" y="483" text-anchor="middle" font-size="12" fill="#534AB7">Serves CSS, JS, images directly</text>

  <!-- Middleware 4 -->
  <rect x="76" y="502" width="528" height="44" rx="8" fill="#EEEDFE" stroke="#7F77DD" stroke-width="0.5"/>
  <text x="340" y="521" text-anchor="middle" font-size="14" font-weight="600" fill="#3C3489">4. Routing</text>
  <text x="340" y="537" text-anchor="middle" font-size="12" fill="#534AB7">Matches request to an endpoint</text>

  <!-- Middleware 5 -->
  <rect x="76" y="556" width="528" height="44" rx="8" fill="#EEEDFE" stroke="#7F77DD" stroke-width="0.5"/>
  <text x="340" y="575" text-anchor="middle" font-size="14" font-weight="600" fill="#3C3489">5. Authentication</text>
  <text x="340" y="591" text-anchor="middle" font-size="12" fill="#534AB7">Verifies who is calling</text>

  <!-- Middleware 6 -->
  <rect x="76" y="610" width="528" height="44" rx="8" fill="#EEEDFE" stroke="#7F77DD" stroke-width="0.5"/>
  <text x="340" y="629" text-anchor="middle" font-size="14" font-weight="600" fill="#3C3489">6. Authorization</text>
  <text x="340" y="645" text-anchor="middle" font-size="12" fill="#534AB7">Checks caller's permissions</text>

  <!-- Middleware 7 -->
  <rect x="76" y="664" width="528" height="44" rx="8" fill="#EEEDFE" stroke="#7F77DD" stroke-width="0.5"/>
  <text x="340" y="683" text-anchor="middle" font-size="14" font-weight="600" fill="#3C3489">7. Rate limiting (app-level)</text>
  <text x="340" y="699" text-anchor="middle" font-size="12" fill="#534AB7">Fine-grained per-user / per-endpoint</text>

  <!-- Filter 1 -->
  <rect x="76" y="802" width="528" height="36" rx="8" fill="#E1F5EE" stroke="#5DCAA5" stroke-width="0.5"/>
  <text x="340" y="823" text-anchor="middle" font-size="14" font-weight="600" fill="#085041">1. Authorization filters — resource-based checks</text>

  <!-- Filter 2 -->
  <rect x="76" y="848" width="528" height="36" rx="8" fill="#E1F5EE" stroke="#5DCAA5" stroke-width="0.5"/>
  <text x="340" y="869" text-anchor="middle" font-size="14" font-weight="600" fill="#085041">2. Resource filters — can short-circuit (e.g. cache)</text>

  <!-- Filter 3 -->
  <rect x="76" y="894" width="528" height="36" rx="8" fill="#E1F5EE" stroke="#5DCAA5" stroke-width="0.5"/>
  <text x="340" y="915" text-anchor="middle" font-size="14" font-weight="600" fill="#085041">3. Model binding + validation</text>

  <!-- Filter 4 -->
  <rect x="76" y="940" width="528" height="36" rx="8" fill="#E1F5EE" stroke="#5DCAA5" stroke-width="0.5"/>
  <text x="340" y="961" text-anchor="middle" font-size="14" font-weight="600" fill="#085041">4. Action filters — before / after the action</text>

  <!-- Filter 5 -->
  <rect x="76" y="986" width="528" height="36" rx="8" fill="#E1F5EE" stroke="#5DCAA5" stroke-width="0.5"/>
  <text x="340" y="1007" text-anchor="middle" font-size="14" font-weight="600" fill="#085041">5. Action method executes</text>

  <!-- Filter 6 -->
  <rect x="76" y="1032" width="528" height="36" rx="8" fill="#E1F5EE" stroke="#5DCAA5" stroke-width="0.5"/>
  <text x="340" y="1053" text-anchor="middle" font-size="14" font-weight="600" fill="#085041">6. Result filters — before / after response format</text>

  <!-- Service -->
  <rect x="60" y="1108" width="560" height="52" rx="8" fill="#E1F5EE" stroke="#5DCAA5" stroke-width="0.5"/>
  <text x="340" y="1131" text-anchor="middle" font-size="14" font-weight="600" fill="#085041">Service layer</text>
  <text x="340" y="1149" text-anchor="middle" font-size="12" fill="#0F6E56">Core business logic</text>

  <!-- Repository -->
  <rect x="60" y="1186" width="560" height="52" rx="8" fill="#E1F5EE" stroke="#5DCAA5" stroke-width="0.5"/>
  <text x="340" y="1209" text-anchor="middle" font-size="14" font-weight="600" fill="#085041">Repository + EF Core</text>
  <text x="340" y="1227" text-anchor="middle" font-size="12" fill="#0F6E56">Data access, LINQ to SQL</text>

  <!-- Database -->
  <rect x="60" y="1264" width="560" height="52" rx="8" fill="#F1EFE8" stroke="#888780" stroke-width="0.5"/>
  <text x="340" y="1287" text-anchor="middle" font-size="14" font-weight="600" fill="#2C2C2A">Database</text>
  <text x="340" y="1305" text-anchor="middle" font-size="12" fill="#5F5E5A">SQL Server stores and returns data</text>

  <!-- Legend -->
  <rect x="60" y="1342" width="15" height="15" rx="4" fill="#F1EFE8" stroke="#888780" stroke-width="0.5"/>
  <text x="82" y="1354" font-size="12" fill="#444441">Infrastructure</text>
  <rect x="215" y="1342" width="15" height="15" rx="4" fill="#EEEDFE" stroke="#7F77DD" stroke-width="0.5"/>
  <text x="238" y="1354" font-size="12" fill="#444441">Middleware (ordered)</text>
  <rect x="430" y="1342" width="15" height="15" rx="4" fill="#E1F5EE" stroke="#5DCAA5" stroke-width="0.5"/>
  <text x="453" y="1354" font-size="12" fill="#444441">Application layer + filters</text>

  <text x="340" y="1392" text-anchor="middle" font-size="12" fill="#5F5E5A">↻ Response flows back up the pipeline; ILogger is injected and used in every layer</text>
</svg>
