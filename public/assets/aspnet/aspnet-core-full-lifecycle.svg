<svg xmlns="http://www.w3.org/2000/svg" width="100%" viewBox="0 0 680 2480" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#94a3b8" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arrow-up" viewBox="0 0 10 10" refX="5" refY="2" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M1 8L5 2L9 8" fill="none" stroke="#60a5fa" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <rect width="680" height="2480" fill="#1a2030"/>
  <text x="340" y="32" text-anchor="middle" font-size="19" font-weight="600" fill="#e8eaed">ASP.NET Core — from source code to served request</text>

  <!-- Phase 1 -->
  <text x="40" y="62" font-size="13" font-weight="600" fill="#93c5fd">Phase 1 · Build time (once, before deploy)</text>

  <rect x="40" y="74" width="132" height="76" rx="8" fill="#1e3a1e" stroke="#4ade80" stroke-width="0.5"/>
  <text x="106" y="98" text-anchor="middle" font-size="13" font-weight="600" fill="#86efac">1. Source code</text>
  <text x="106" y="116" text-anchor="middle" font-size="11" fill="#bbf7d0">C# classes, controllers,</text>
  <text x="106" y="132" text-anchor="middle" font-size="11" fill="#bbf7d0">services + BCL APIs</text>

  <rect x="196" y="74" width="132" height="76" rx="8" fill="#3b1f14" stroke="#fb923c" stroke-width="0.5"/>
  <text x="262" y="98" text-anchor="middle" font-size="13" font-weight="600" fill="#fdba74">2. Compiler</text>
  <text x="262" y="116" text-anchor="middle" font-size="11" fill="#fed7aa">Roslyn parses C#</text>
  <text x="262" y="132" text-anchor="middle" font-size="11" fill="#fed7aa">and emits IL bytecode</text>

  <rect x="352" y="74" width="132" height="76" rx="8" fill="#422006" stroke="#fbbf24" stroke-width="0.5"/>
  <text x="418" y="98" text-anchor="middle" font-size="13" font-weight="600" fill="#fde68a">3. IL</text>
  <text x="418" y="116" text-anchor="middle" font-size="11" fill="#fef3c7">Platform-neutral</text>
  <text x="418" y="132" text-anchor="middle" font-size="11" fill="#fef3c7">intermediate language</text>

  <rect x="508" y="74" width="132" height="76" rx="8" fill="#2e2a5e" stroke="#818cf8" stroke-width="0.5"/>
  <text x="574" y="98" text-anchor="middle" font-size="13" font-weight="600" fill="#a5b4fc">4. Assembly</text>
  <text x="574" y="116" text-anchor="middle" font-size="11" fill="#c7d2fe">Packaged output</text>
  <text x="574" y="132" text-anchor="middle" font-size="11" fill="#c7d2fe">.dll or .exe file</text>

  <line x1="172" y1="112" x2="192" y2="112" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="328" y1="112" x2="348" y2="112" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="484" y1="112" x2="504" y2="112" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="574" y1="154" x2="574" y2="168" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="196" y="170" width="288" height="54" rx="8" fill="#1e293b" stroke="#64748b" stroke-width="0.5"/>
  <text x="340" y="192" text-anchor="middle" font-size="13" font-weight="600" fill="#cbd5e1">5. dotnet publish</text>
  <text x="340" y="210" text-anchor="middle" font-size="11" fill="#94a3b8">Bundles app + deps into deploy folder or Docker image</text>
  <line x1="340" y1="228" x2="340" y2="248" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Phase 2 -->
  <text x="40" y="244" font-size="13" font-weight="600" fill="#93c5fd">Phase 2 · App startup — CLR loads &amp; JIT-compiles</text>
  <rect x="40" y="256" width="600" height="158" rx="14" fill="#0c2d4a" stroke="#38bdf8" stroke-width="1"/>
  <text x="340" y="280" text-anchor="middle" font-size="14" font-weight="600" fill="#7dd3fc">Common Language Runtime (CLR)</text>

  <rect x="56" y="296" width="184" height="100" rx="8" fill="#0f3d5c" stroke="#0ea5e9" stroke-width="0.5"/>
  <text x="148" y="318" text-anchor="middle" font-size="13" font-weight="600" fill="#7dd3fc">CLR loads assembly</text>
  <text x="148" y="336" text-anchor="middle" font-size="11" fill="#bae6fd">Reads IL + metadata</text>
  <text x="148" y="352" text-anchor="middle" font-size="11" fill="#bae6fd">Resolves BCL references</text>
  <text x="148" y="368" text-anchor="middle" font-size="11" fill="#bae6fd">Creates app domain</text>

  <rect x="248" y="296" width="184" height="100" rx="8" fill="#0f3d5c" stroke="#0ea5e9" stroke-width="0.5"/>
  <text x="340" y="318" text-anchor="middle" font-size="13" font-weight="600" fill="#7dd3fc">JIT compilation</text>
  <text x="340" y="336" text-anchor="middle" font-size="11" fill="#bae6fd">IL → native CPU code</text>
  <text x="340" y="352" text-anchor="middle" font-size="11" fill="#bae6fd">On first method call</text>
  <text x="340" y="368" text-anchor="middle" font-size="11" fill="#bae6fd">(AOT/R2R skips JIT)</text>

  <rect x="440" y="296" width="184" height="100" rx="8" fill="#0f3d5c" stroke="#0ea5e9" stroke-width="0.5"/>
  <text x="532" y="318" text-anchor="middle" font-size="13" font-weight="600" fill="#7dd3fc">Managed services</text>
  <text x="532" y="336" text-anchor="middle" font-size="11" fill="#bae6fd">GC frees unused memory</text>
  <text x="532" y="352" text-anchor="middle" font-size="11" fill="#bae6fd">Thread pool, exceptions</text>
  <text x="532" y="368" text-anchor="middle" font-size="11" fill="#bae6fd">Type safety enforced</text>
  <line x1="340" y1="418" x2="340" y2="438" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Phase 2.5 -->
  <text x="40" y="434" font-size="13" font-weight="600" fill="#93c5fd">Phase 2.5 · ASP.NET Core host startup (once per process)</text>
  <rect x="40" y="446" width="600" height="88" rx="14" fill="#1e1b4b" stroke="#6366f1" stroke-width="1"/>
  <text x="340" y="470" text-anchor="middle" font-size="14" font-weight="600" fill="#a5b4fc">WebApplication.CreateBuilder()</text>
  <text x="340" y="488" text-anchor="middle" font-size="11" fill="#c7d2fe">ConfigureServices: registers DI (DbContext, services, auth)</text>
  <text x="340" y="504" text-anchor="middle" font-size="11" fill="#c7d2fe">Build pipeline: app.UseRouting(), UseAuth(), MapControllers()</text>
  <text x="340" y="520" text-anchor="middle" font-size="11" fill="#94a3b8">app.Run() — starts Kestrel, listens for HTTP requests</text>
  <line x1="340" y1="538" x2="340" y2="558" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Phase 3 -->
  <text x="40" y="552" font-size="13" font-weight="600" fill="#93c5fd">Phase 3 · Per request (every HTTP request)</text>

  <rect x="60" y="568" width="560" height="54" rx="8" fill="#2d3748" stroke="#64748b" stroke-width="0.5"/>
  <text x="340" y="590" text-anchor="middle" font-size="13" font-weight="600" fill="#e2e8f0">Client</text>
  <text x="340" y="608" text-anchor="middle" font-size="11" fill="#94a3b8">Browser/app sends HTTP request with headers, body, JWT token</text>
  <line x1="340" y1="624" x2="340" y2="636" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="60" y="638" width="560" height="54" rx="8" fill="#2d3748" stroke="#64748b" stroke-width="0.5"/>
  <text x="340" y="660" text-anchor="middle" font-size="13" font-weight="600" fill="#e2e8f0">Load balancer / API gateway</text>
  <text x="340" y="678" text-anchor="middle" font-size="11" fill="#94a3b8">Spreads traffic across instances; coarse per-IP / per-key rate limits</text>
  <line x1="340" y1="694" x2="340" y2="706" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="60" y="708" width="560" height="54" rx="8" fill="#2d3748" stroke="#64748b" stroke-width="0.5"/>
  <text x="340" y="730" text-anchor="middle" font-size="13" font-weight="600" fill="#e2e8f0">Reverse proxy (Nginx / IIS)</text>
  <text x="340" y="748" text-anchor="middle" font-size="11" fill="#94a3b8">Terminates SSL/TLS; forwards decrypted HTTP to Kestrel</text>
  <line x1="340" y1="764" x2="340" y2="776" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="60" y="778" width="560" height="54" rx="8" fill="#2d3748" stroke="#64748b" stroke-width="0.5"/>
  <text x="340" y="800" text-anchor="middle" font-size="13" font-weight="600" fill="#e2e8f0">Kestrel web server</text>
  <text x="340" y="818" text-anchor="middle" font-size="11" fill="#94a3b8">Parses HTTP; creates HttpContext; passes to middleware pipeline</text>
  <line x1="340" y1="834" x2="340" y2="848" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Middleware -->
  <rect x="60" y="848" width="560" height="562" rx="14" fill="#252320" stroke="#57534e" stroke-width="1"/>
  <text x="340" y="872" text-anchor="middle" font-size="14" font-weight="600" fill="#e7e5e4">Middleware pipeline — runs in order</text>

  <rect x="76" y="884" width="528" height="54" rx="8" fill="#312e81" stroke="#6366f1" stroke-width="0.5"/>
  <text x="340" y="906" text-anchor="middle" font-size="13" font-weight="600" fill="#a5b4fc">1. Exception handling</text>
  <text x="340" y="924" text-anchor="middle" font-size="11" fill="#c7d2fe">Catches unhandled errors; returns ProblemDetails JSON (RFC 7807)</text>

  <rect x="76" y="944" width="528" height="54" rx="8" fill="#312e81" stroke="#6366f1" stroke-width="0.5"/>
  <text x="340" y="966" text-anchor="middle" font-size="13" font-weight="600" fill="#a5b4fc">2. HTTPS redirection</text>
  <text x="340" y="984" text-anchor="middle" font-size="11" fill="#c7d2fe">Auto-redirects http:// requests to https:// for security</text>

  <rect x="76" y="1004" width="528" height="54" rx="8" fill="#312e81" stroke="#6366f1" stroke-width="0.5"/>
  <text x="340" y="1026" text-anchor="middle" font-size="13" font-weight="600" fill="#a5b4fc">3. Request logging</text>
  <text x="340" y="1044" text-anchor="middle" font-size="11" fill="#c7d2fe">Serilog/ILogger logs method, path, status code, duration</text>

  <rect x="76" y="1064" width="528" height="54" rx="8" fill="#312e81" stroke="#6366f1" stroke-width="0.5"/>
  <text x="340" y="1086" text-anchor="middle" font-size="13" font-weight="600" fill="#a5b4fc">4. Static files (wwwroot)</text>
  <text x="340" y="1104" text-anchor="middle" font-size="11" fill="#c7d2fe">Serves CSS, JS, images directly — skips controller if file found</text>

  <rect x="76" y="1124" width="528" height="54" rx="8" fill="#312e81" stroke="#6366f1" stroke-width="0.5"/>
  <text x="340" y="1146" text-anchor="middle" font-size="13" font-weight="600" fill="#a5b4fc">5. Routing</text>
  <text x="340" y="1164" text-anchor="middle" font-size="11" fill="#c7d2fe">Matches URL to controller action or Minimal API endpoint</text>

  <rect x="76" y="1184" width="528" height="54" rx="8" fill="#312e81" stroke="#6366f1" stroke-width="0.5"/>
  <text x="340" y="1206" text-anchor="middle" font-size="13" font-weight="600" fill="#a5b4fc">6. CORS</text>
  <text x="340" y="1224" text-anchor="middle" font-size="11" fill="#c7d2fe">Adds Access-Control-Allow-Origin headers for browser clients</text>

  <rect x="76" y="1244" width="528" height="54" rx="8" fill="#312e81" stroke="#6366f1" stroke-width="0.5"/>
  <text x="340" y="1266" text-anchor="middle" font-size="13" font-weight="600" fill="#a5b4fc">7. Authentication</text>
  <text x="340" y="1284" text-anchor="middle" font-size="11" fill="#c7d2fe">Validates JWT/cookie; sets HttpContext.User with claims identity</text>

  <rect x="76" y="1304" width="528" height="54" rx="8" fill="#312e81" stroke="#6366f1" stroke-width="0.5"/>
  <text x="340" y="1326" text-anchor="middle" font-size="13" font-weight="600" fill="#a5b4fc">8. Authorization</text>
  <text x="340" y="1344" text-anchor="middle" font-size="11" fill="#c7d2fe">Enforces policies/roles from UseAuthorization() middleware</text>

  <rect x="76" y="1364" width="528" height="54" rx="8" fill="#312e81" stroke="#6366f1" stroke-width="0.5"/>
  <text x="340" y="1386" text-anchor="middle" font-size="13" font-weight="600" fill="#a5b4fc">9. Rate limiting (app-level)</text>
  <text x="340" y="1404" text-anchor="middle" font-size="11" fill="#c7d2fe">Returns 429 Too Many Requests if per-user/endpoint quota exceeded</text>
  <line x1="340" y1="1426" x2="340" y2="1440" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Filters -->
  <rect x="60" y="1440" width="560" height="388" rx="14" fill="#252320" stroke="#57534e" stroke-width="1"/>
  <text x="340" y="1464" text-anchor="middle" font-size="14" font-weight="600" fill="#e7e5e4">Controller / Minimal API — MVC filters</text>

  <rect x="76" y="1476" width="528" height="54" rx="8" fill="#134e4a" stroke="#14b8a6" stroke-width="0.5"/>
  <text x="340" y="1498" text-anchor="middle" font-size="13" font-weight="600" fill="#5eead4">1. Authorization filters</text>
  <text x="340" y="1516" text-anchor="middle" font-size="11" fill="#99f6e4">Runs [Authorize] check; returns 403 Forbidden before action if denied</text>

  <rect x="76" y="1536" width="528" height="54" rx="8" fill="#134e4a" stroke="#14b8a6" stroke-width="0.5"/>
  <text x="340" y="1558" text-anchor="middle" font-size="13" font-weight="600" fill="#5eead4">2. Resource filters</text>
  <text x="340" y="1576" text-anchor="middle" font-size="11" fill="#99f6e4">Can short-circuit request early; used for response caching</text>

  <rect x="76" y="1596" width="528" height="54" rx="8" fill="#134e4a" stroke="#14b8a6" stroke-width="0.5"/>
  <text x="340" y="1618" text-anchor="middle" font-size="13" font-weight="600" fill="#5eead4">3. Action filters</text>
  <text x="340" y="1636" text-anchor="middle" font-size="11" fill="#99f6e4">OnActionExecuting/Executed — logging, custom validation, timing</text>

  <rect x="76" y="1656" width="528" height="54" rx="8" fill="#134e4a" stroke="#14b8a6" stroke-width="0.5"/>
  <text x="340" y="1678" text-anchor="middle" font-size="13" font-weight="600" fill="#5eead4">4. Action executes</text>
  <text x="340" y="1696" text-anchor="middle" font-size="11" fill="#99f6e4">Model binder maps JSON/query to DTO; DataAnnotations validate input</text>

  <rect x="76" y="1716" width="528" height="54" rx="8" fill="#134e4a" stroke="#14b8a6" stroke-width="0.5"/>
  <text x="340" y="1738" text-anchor="middle" font-size="13" font-weight="600" fill="#5eead4">5. Exception filters</text>
  <text x="340" y="1756" text-anchor="middle" font-size="11" fill="#99f6e4">Catches exceptions from action; returns custom error without crashing</text>

  <rect x="76" y="1776" width="528" height="54" rx="8" fill="#134e4a" stroke="#14b8a6" stroke-width="0.5"/>
  <text x="340" y="1798" text-anchor="middle" font-size="13" font-weight="600" fill="#5eead4">6. Result filters</text>
  <text x="340" y="1816" text-anchor="middle" font-size="11" fill="#99f6e4">Transforms IActionResult before serialization; wraps in ApiResponse</text>
  <line x1="340" y1="1836" x2="340" y2="1850" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="60" y="1850" width="560" height="54" rx="8" fill="#134e4a" stroke="#14b8a6" stroke-width="0.5"/>
  <text x="340" y="1872" text-anchor="middle" font-size="13" font-weight="600" fill="#5eead4">Service layer</text>
  <text x="340" y="1890" text-anchor="middle" font-size="11" fill="#99f6e4">Business rules, validation logic, orchestration — no HTTP concerns</text>
  <line x1="340" y1="1906" x2="340" y2="1920" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="60" y="1920" width="560" height="54" rx="8" fill="#134e4a" stroke="#14b8a6" stroke-width="0.5"/>
  <text x="340" y="1942" text-anchor="middle" font-size="13" font-weight="600" fill="#5eead4">Repository + EF Core (DbContext)</text>
  <text x="340" y="1960" text-anchor="middle" font-size="11" fill="#99f6e4">Abstracts DB access; LINQ → SQL; tracks entity changes for SaveChanges</text>
  <line x1="340" y1="1976" x2="340" y2="1990" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="60" y="1990" width="560" height="54" rx="8" fill="#2d3748" stroke="#64748b" stroke-width="0.5"/>
  <text x="340" y="2012" text-anchor="middle" font-size="13" font-weight="600" fill="#e2e8f0">Database (SQL Server)</text>
  <text x="340" y="2030" text-anchor="middle" font-size="11" fill="#94a3b8">Executes SQL; stores/returns rows; transactions ensure data consistency</text>

  <!-- Response arrow -->
  <path d="M 648 2016 L 648 590" fill="none" stroke="#60a5fa" stroke-width="1.5" stroke-dasharray="6 4" marker-end="url(#arrow-up)"/>
  <text x="662" y="1300" font-size="11" fill="#60a5fa" transform="rotate(90 662 1300)">response flows back ↑</text>

  <!-- Legend -->
  <rect x="40" y="2076" width="15" height="15" rx="4" fill="#1e3a1e" stroke="#4ade80" stroke-width="0.5"/>
  <text x="62" y="2088" font-size="12" fill="#94a3b8">Build</text>
  <rect x="100" y="2076" width="15" height="15" rx="4" fill="#0f3d5c" stroke="#0ea5e9" stroke-width="0.5"/>
  <text x="122" y="2088" font-size="12" fill="#94a3b8">CLR</text>
  <rect x="152" y="2076" width="15" height="15" rx="4" fill="#1e1b4b" stroke="#6366f1" stroke-width="0.5"/>
  <text x="174" y="2088" font-size="12" fill="#94a3b8">Host</text>
  <rect x="210" y="2076" width="15" height="15" rx="4" fill="#2d3748" stroke="#64748b" stroke-width="0.5"/>
  <text x="232" y="2088" font-size="12" fill="#94a3b8">Infra</text>
  <rect x="280" y="2076" width="15" height="15" rx="4" fill="#312e81" stroke="#6366f1" stroke-width="0.5"/>
  <text x="302" y="2088" font-size="12" fill="#94a3b8">Middleware</text>
  <rect x="390" y="2076" width="15" height="15" rx="4" fill="#134e4a" stroke="#14b8a6" stroke-width="0.5"/>
  <text x="412" y="2088" font-size="12" fill="#94a3b8">Filters + app</text>
  <rect x="510" y="2076" width="15" height="15" rx="4" fill="none" stroke="#60a5fa" stroke-width="1" stroke-dasharray="3 2"/>
  <text x="532" y="2088" font-size="12" fill="#94a3b8">Response</text>

  <text x="340" y="2128" text-anchor="middle" font-size="12" fill="#94a3b8">↻ Response travels back up through every layer in reverse order</text>
  <text x="340" y="2150" text-anchor="middle" font-size="11" fill="#64748b">.NET 8+: Native AOT compiles to native binary at publish — skips JIT at runtime</text>
</svg>
