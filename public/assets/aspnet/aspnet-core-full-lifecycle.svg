<svg xmlns="http://www.w3.org/2000/svg" width="100%" viewBox="0 0 680 1880" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#94a3b8" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arrow-up" viewBox="0 0 10 10" refX="5" refY="2" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M1 8L5 2L9 8" fill="none" stroke="#60a5fa" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <rect width="680" height="1880" fill="#1a2030"/>
  <text x="340" y="32" text-anchor="middle" font-size="19" font-weight="600" fill="#e8eaed">ASP.NET Core — from source code to served request</text>

  <!-- Phase 1 -->
  <text x="40" y="62" font-size="13" font-weight="600" fill="#93c5fd">Phase 1 · Build time (once, before deploy)</text>
  <rect x="40" y="74" width="132" height="64" rx="8" fill="#1e3a1e" stroke="#4ade80" stroke-width="0.5"/>
  <text x="106" y="102" text-anchor="middle" font-size="14" font-weight="600" fill="#86efac">1. Source code</text>
  <text x="106" y="120" text-anchor="middle" font-size="12" fill="#bbf7d0">C# + BCL</text>
  <rect x="196" y="74" width="132" height="64" rx="8" fill="#3b1f14" stroke="#fb923c" stroke-width="0.5"/>
  <text x="262" y="102" text-anchor="middle" font-size="14" font-weight="600" fill="#fdba74">2. Compiler</text>
  <text x="262" y="120" text-anchor="middle" font-size="12" fill="#fed7aa">Roslyn → IL</text>
  <rect x="352" y="74" width="132" height="64" rx="8" fill="#422006" stroke="#fbbf24" stroke-width="0.5"/>
  <text x="418" y="102" text-anchor="middle" font-size="14" font-weight="600" fill="#fde68a">3. IL</text>
  <text x="418" y="120" text-anchor="middle" font-size="12" fill="#fef3c7">neutral bytecode</text>
  <rect x="508" y="74" width="132" height="64" rx="8" fill="#2e2a5e" stroke="#818cf8" stroke-width="0.5"/>
  <text x="574" y="102" text-anchor="middle" font-size="14" font-weight="600" fill="#a5b4fc">4. Assembly</text>
  <text x="574" y="120" text-anchor="middle" font-size="12" fill="#c7d2fe">.dll / .exe</text>
  <line x1="172" y1="106" x2="192" y2="106" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="328" y1="106" x2="348" y2="106" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="484" y1="106" x2="504" y2="106" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="574" y1="142" x2="574" y2="158" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="196" y="160" width="288" height="44" rx="8" fill="#1e293b" stroke="#64748b" stroke-width="0.5"/>
  <text x="340" y="179" text-anchor="middle" font-size="14" font-weight="600" fill="#cbd5e1">5. dotnet publish</text>
  <text x="340" y="195" text-anchor="middle" font-size="12" fill="#94a3b8">Deploy artifact or Docker image</text>
  <line x1="340" y1="208" x2="340" y2="228" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Phase 2 -->
  <text x="40" y="224" font-size="13" font-weight="600" fill="#93c5fd">Phase 2 · App startup — CLR loads &amp; JIT-compiles</text>
  <rect x="40" y="236" width="600" height="138" rx="14" fill="#0c2d4a" stroke="#38bdf8" stroke-width="1"/>
  <text x="340" y="260" text-anchor="middle" font-size="14" font-weight="600" fill="#7dd3fc">Common Language Runtime (CLR)</text>
  <rect x="56" y="276" width="184" height="80" rx="8" fill="#0f3d5c" stroke="#0ea5e9" stroke-width="0.5"/>
  <text x="148" y="304" text-anchor="middle" font-size="14" font-weight="600" fill="#7dd3fc">CLR loads assembly</text>
  <text x="148" y="326" text-anchor="middle" font-size="12" fill="#bae6fd">IL + metadata + BCL</text>
  <rect x="248" y="276" width="184" height="80" rx="8" fill="#0f3d5c" stroke="#0ea5e9" stroke-width="0.5"/>
  <text x="340" y="304" text-anchor="middle" font-size="14" font-weight="600" fill="#7dd3fc">JIT compilation</text>
  <text x="340" y="326" text-anchor="middle" font-size="12" fill="#bae6fd">IL → native (or AOT/R2R)</text>
  <rect x="440" y="276" width="184" height="80" rx="8" fill="#0f3d5c" stroke="#0ea5e9" stroke-width="0.5"/>
  <text x="532" y="304" text-anchor="middle" font-size="14" font-weight="600" fill="#7dd3fc">Managed services</text>
  <text x="532" y="326" text-anchor="middle" font-size="12" fill="#bae6fd">GC, threads, exceptions</text>
  <line x1="340" y1="378" x2="340" y2="398" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Phase 2.5 -->
  <text x="40" y="394" font-size="13" font-weight="600" fill="#93c5fd">Phase 2.5 · ASP.NET Core host startup (once per process)</text>
  <rect x="40" y="406" width="600" height="72" rx="14" fill="#1e1b4b" stroke="#6366f1" stroke-width="1"/>
  <text x="340" y="430" text-anchor="middle" font-size="14" font-weight="600" fill="#a5b4fc">WebApplication.CreateBuilder()</text>
  <text x="340" y="448" text-anchor="middle" font-size="12" fill="#c7d2fe">ConfigureServices (DI) → middleware pipeline → app.Run()</text>
  <text x="340" y="466" text-anchor="middle" font-size="12" fill="#94a3b8">Registers controllers, DbContext, auth, logging</text>
  <line x1="340" y1="482" x2="340" y2="508" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Phase 3 -->
  <text x="40" y="502" font-size="13" font-weight="600" fill="#93c5fd">Phase 3 · Per request (every HTTP request)</text>

  <rect x="60" y="518" width="560" height="52" rx="8" fill="#2d3748" stroke="#64748b" stroke-width="0.5"/>
  <text x="340" y="541" text-anchor="middle" font-size="14" font-weight="600" fill="#e2e8f0">Client</text>
  <text x="340" y="559" text-anchor="middle" font-size="12" fill="#94a3b8">Browser or mobile app</text>
  <line x1="340" y1="572" x2="340" y2="582" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="60" y="584" width="560" height="52" rx="8" fill="#2d3748" stroke="#64748b" stroke-width="0.5"/>
  <text x="340" y="607" text-anchor="middle" font-size="14" font-weight="600" fill="#e2e8f0">Load balancer / API gateway</text>
  <text x="340" y="625" text-anchor="middle" font-size="12" fill="#94a3b8">Per-IP, per-API-key rate limiting</text>
  <line x1="340" y1="638" x2="340" y2="648" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="60" y="650" width="560" height="52" rx="8" fill="#2d3748" stroke="#64748b" stroke-width="0.5"/>
  <text x="340" y="673" text-anchor="middle" font-size="14" font-weight="600" fill="#e2e8f0">Reverse proxy (Nginx / IIS)</text>
  <text x="340" y="691" text-anchor="middle" font-size="12" fill="#94a3b8">TLS termination → forwards to Kestrel</text>
  <line x1="340" y1="704" x2="340" y2="714" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="60" y="716" width="560" height="44" rx="8" fill="#2d3748" stroke="#64748b" stroke-width="0.5"/>
  <text x="340" y="735" text-anchor="middle" font-size="14" font-weight="600" fill="#e2e8f0">Kestrel web server</text>
  <text x="340" y="751" text-anchor="middle" font-size="12" fill="#94a3b8">Accepts connection, forwards to pipeline</text>
  <line x1="340" y1="762" x2="340" y2="776" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Middleware -->
  <rect x="60" y="776" width="560" height="458" rx="14" fill="#252320" stroke="#57534e" stroke-width="1"/>
  <text x="340" y="800" text-anchor="middle" font-size="14" font-weight="600" fill="#e7e5e4">Middleware pipeline</text>

  <rect x="76" y="812" width="528" height="40" rx="8" fill="#312e81" stroke="#6366f1" stroke-width="0.5"/>
  <text x="340" y="836" text-anchor="middle" font-size="13" font-weight="600" fill="#a5b4fc">1. Exception handling</text>
  <rect x="76" y="858" width="528" height="40" rx="8" fill="#312e81" stroke="#6366f1" stroke-width="0.5"/>
  <text x="340" y="882" text-anchor="middle" font-size="13" font-weight="600" fill="#a5b4fc">2. HTTPS redirection</text>
  <rect x="76" y="904" width="528" height="40" rx="8" fill="#312e81" stroke="#6366f1" stroke-width="0.5"/>
  <text x="340" y="928" text-anchor="middle" font-size="13" font-weight="600" fill="#a5b4fc">3. Request logging (Serilog)</text>
  <rect x="76" y="950" width="528" height="40" rx="8" fill="#312e81" stroke="#6366f1" stroke-width="0.5"/>
  <text x="340" y="974" text-anchor="middle" font-size="13" font-weight="600" fill="#a5b4fc">4. Static files (wwwroot)</text>
  <rect x="76" y="996" width="528" height="40" rx="8" fill="#312e81" stroke="#6366f1" stroke-width="0.5"/>
  <text x="340" y="1020" text-anchor="middle" font-size="13" font-weight="600" fill="#a5b4fc">5. Routing</text>
  <rect x="76" y="1042" width="528" height="40" rx="8" fill="#312e81" stroke="#6366f1" stroke-width="0.5"/>
  <text x="340" y="1066" text-anchor="middle" font-size="13" font-weight="600" fill="#a5b4fc">6. CORS</text>
  <rect x="76" y="1088" width="528" height="40" rx="8" fill="#312e81" stroke="#6366f1" stroke-width="0.5"/>
  <text x="340" y="1112" text-anchor="middle" font-size="13" font-weight="600" fill="#a5b4fc">7. Authentication (JWT / cookies)</text>
  <rect x="76" y="1134" width="528" height="40" rx="8" fill="#312e81" stroke="#6366f1" stroke-width="0.5"/>
  <text x="340" y="1158" text-anchor="middle" font-size="13" font-weight="600" fill="#a5b4fc">8. Authorization</text>
  <rect x="76" y="1180" width="528" height="40" rx="8" fill="#312e81" stroke="#6366f1" stroke-width="0.5"/>
  <text x="340" y="1204" text-anchor="middle" font-size="13" font-weight="600" fill="#a5b4fc">9. Rate limiting (app-level)</text>
  <line x1="340" y1="1234" x2="340" y2="1248" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Filters -->
  <rect x="60" y="1248" width="560" height="268" rx="14" fill="#252320" stroke="#57534e" stroke-width="1"/>
  <text x="340" y="1272" text-anchor="middle" font-size="14" font-weight="600" fill="#e7e5e4">Controller / Minimal API — MVC filters</text>

  <rect x="76" y="1284" width="528" height="34" rx="8" fill="#134e4a" stroke="#14b8a6" stroke-width="0.5"/>
  <text x="340" y="1305" text-anchor="middle" font-size="13" font-weight="600" fill="#5eead4">1. Authorization filters</text>
  <rect x="76" y="1326" width="528" height="34" rx="8" fill="#134e4a" stroke="#14b8a6" stroke-width="0.5"/>
  <text x="340" y="1347" text-anchor="middle" font-size="13" font-weight="600" fill="#5eead4">2. Resource filters</text>
  <rect x="76" y="1368" width="528" height="34" rx="8" fill="#134e4a" stroke="#14b8a6" stroke-width="0.5"/>
  <text x="340" y="1389" text-anchor="middle" font-size="13" font-weight="600" fill="#5eead4">3. Action filters — before / after</text>
  <rect x="76" y="1410" width="528" height="34" rx="8" fill="#134e4a" stroke="#14b8a6" stroke-width="0.5"/>
  <text x="340" y="1431" text-anchor="middle" font-size="13" font-weight="600" fill="#5eead4">4. Action executes — model binding + validation</text>
  <rect x="76" y="1452" width="528" height="34" rx="8" fill="#134e4a" stroke="#14b8a6" stroke-width="0.5"/>
  <text x="340" y="1473" text-anchor="middle" font-size="13" font-weight="600" fill="#5eead4">5. Exception filters — if action throws</text>
  <rect x="76" y="1494" width="528" height="34" rx="8" fill="#134e4a" stroke="#14b8a6" stroke-width="0.5"/>
  <text x="340" y="1515" text-anchor="middle" font-size="13" font-weight="600" fill="#5eead4">6. Result filters — format response</text>
  <line x1="340" y1="1528" x2="340" y2="1542" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="60" y="1542" width="560" height="44" rx="8" fill="#134e4a" stroke="#14b8a6" stroke-width="0.5"/>
  <text x="340" y="1568" text-anchor="middle" font-size="14" font-weight="600" fill="#5eead4">Service layer — business logic</text>
  <line x1="340" y1="1588" x2="340" y2="1602" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="60" y="1602" width="560" height="44" rx="8" fill="#134e4a" stroke="#14b8a6" stroke-width="0.5"/>
  <text x="340" y="1628" text-anchor="middle" font-size="14" font-weight="600" fill="#5eead4">Repository + EF Core (DbContext)</text>
  <line x1="340" y1="1648" x2="340" y2="1662" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="60" y="1662" width="560" height="44" rx="8" fill="#2d3748" stroke="#64748b" stroke-width="0.5"/>
  <text x="340" y="1688" text-anchor="middle" font-size="14" font-weight="600" fill="#e2e8f0">Database (SQL Server)</text>

  <!-- Response arrow -->
  <path d="M 648 1684 L 648 540" fill="none" stroke="#60a5fa" stroke-width="1.5" stroke-dasharray="6 4" marker-end="url(#arrow-up)"/>
  <text x="662" y="1110" font-size="11" fill="#60a5fa" transform="rotate(90 662 1110)">response ↑</text>

  <!-- Legend -->
  <rect x="40" y="1736" width="15" height="15" rx="4" fill="#1e3a1e" stroke="#4ade80" stroke-width="0.5"/>
  <text x="62" y="1748" font-size="12" fill="#94a3b8">Build</text>
  <rect x="100" y="1736" width="15" height="15" rx="4" fill="#0f3d5c" stroke="#0ea5e9" stroke-width="0.5"/>
  <text x="122" y="1748" font-size="12" fill="#94a3b8">CLR</text>
  <rect x="152" y="1736" width="15" height="15" rx="4" fill="#1e1b4b" stroke="#6366f1" stroke-width="0.5"/>
  <text x="174" y="1748" font-size="12" fill="#94a3b8">Host</text>
  <rect x="210" y="1736" width="15" height="15" rx="4" fill="#2d3748" stroke="#64748b" stroke-width="0.5"/>
  <text x="232" y="1748" font-size="12" fill="#94a3b8">Infra</text>
  <rect x="280" y="1736" width="15" height="15" rx="4" fill="#312e81" stroke="#6366f1" stroke-width="0.5"/>
  <text x="302" y="1748" font-size="12" fill="#94a3b8">Middleware</text>
  <rect x="390" y="1736" width="15" height="15" rx="4" fill="#134e4a" stroke="#14b8a6" stroke-width="0.5"/>
  <text x="412" y="1748" font-size="12" fill="#94a3b8">Filters + app</text>
  <rect x="510" y="1736" width="15" height="15" rx="4" fill="none" stroke="#60a5fa" stroke-width="1" stroke-dasharray="3 2"/>
  <text x="532" y="1748" font-size="12" fill="#94a3b8">Response</text>

  <text x="340" y="1788" text-anchor="middle" font-size="12" fill="#94a3b8">↻ Response flows back up · ILogger in every layer</text>
  <text x="340" y="1810" text-anchor="middle" font-size="11" fill="#64748b">.NET 8+: Native AOT compiles to native binary at publish — skips JIT</text>
</svg>
